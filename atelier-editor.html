<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Manrope', sans-serif;
  background:#f7f1eb;
  color:#5a463b;
}

.container{
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h1{
  font-family:'Cormorant Garamond', serif;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:8px 0 16px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:999px;
  background:#b88e67;
  color:white;
  cursor:pointer;
}

.message{
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
  <h1>Login</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Parolă">
  <button onclick="login()">Login</button>
  <div class="message" id="loginMsg"></div>
</div>

<div class="container" id="editorBox" style="display:none;">
  <h1>Adaugă produs</h1>

  <input id="title" placeholder="Titlu">
  <input id="slug" placeholder="Slug (auto)">

  <input id="price" type="number" placeholder="Preț">

  <textarea id="p1" placeholder="Paragraf 1"></textarea>
  <textarea id="p2" placeholder="Paragraf 2"></textarea>

  <input id="d1" placeholder="Detail 1">
  <input id="d2" placeholder="Detail 2">
  <input id="d3" placeholder="Detail 3">

  <input id="stitle" placeholder="Special title">
  <textarea id="sdesc" placeholder="Special description"></textarea>

  <input id="i1t" placeholder="Info 1 title">
  <input id="i1d" placeholder="Info 1 text">

  <input id="i2t" placeholder="Info 2 title">
  <input id="i2d" placeholder="Info 2 text">

  <input id="i3t" placeholder="Info 3 title">
  <input id="i3d" placeholder="Info 3 text">

  <input id="btntext" placeholder="Text buton">
  <input id="btnurl" placeholder="Link personalizare">

  <input id="img1" placeholder="Image 1 URL">
  <input id="img2" placeholder="Image 2 URL">
  <input id="img3" placeholder="Image 3 URL">

  <button onclick="saveProduct()">Salvează</button>
  <div class="message" id="saveMsg"></div>
</div>

<script type="module">
import { supabase } from './supabase-config.js';

window.login = async function(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    document.getElementById('loginMsg').innerText = "Email sau parolă greșită";
  } else {
    document.getElementById('loginBox').style.display = "none";
    document.getElementById('editorBox').style.display = "block";
  }
}

function generateSlug(text){
  return text
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '');
}

document.getElementById('title').addEventListener('input', (e)=>{
  document.getElementById('slug').value = generateSlug(e.target.value);
});

window.saveProduct = async function(){

  const data = {
    title: title.value,
    slug: slug.value,
    base_price: Number(price.value),

    short_paragraph_1: p1.value,
    short_paragraph_2: p2.value,

    detail_1: d1.value,
    detail_2: d2.value,
    detail_3: d3.value,

    special_title: stitle.value,
    special_description: sdesc.value,

    info_title_1: i1t.value,
    info_text_1: i1d.value,

    info_title_2: i2t.value,
    info_text_2: i2d.value,

    info_title_3: i3t.value,
    info_text_3: i3d.value,

    customize_button_text: btntext.value,
    customize_url: btnurl.value,

    image_1: img1.value,
    image_2: img2.value,
    image_3: img3.value,

    is_active: true
  };

  const { error } = await supabase
    .from('atelier_products')
    .insert([data]);

  if(error){
    document.getElementById('saveMsg').innerText = "Eroare la salvare";
  } else {
    document.getElementById('saveMsg').innerText = "Salvat cu succes ✨";
  }
}

</script>

</body>
</html>
